#This is the name of workflow
name: Hello
# Runs on an automatic trigger when change is pushed to branch (deployment)
on:
  workflow_dispatch: 
  
# These are jobs inside the workflow
jobs:

#This is the name of the job
  greet:
  # This is github runner, each job runs on a runner
    runs-on: ubuntu-latest
    steps:
#These are the steps name
      - name: Say hello to users
        run: echo "Hello Dosto"

      - name: Say hello to username
        run: echo "Hello $USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: Show what is the version of python, docker, etc
        run: docker --version && python --version
    
        

      
